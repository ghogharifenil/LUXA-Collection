{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png"
          href="{% static 'image/web3.png' %}">
    <link rel="stylesheet" href="{% static 'admincss/base_admin.css' %}" />
    <style>
      .logo-icon{
    width: 55px;
    height: 55px;

    border-radius: 50%;
    overflow: hidden;
}

.logo-icon img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}
    </style>
    {% block head %}

    {% endblock %}
  </head>
  <body>
    <nav class="navbar">
      <div class="logo-section">
        <div class="logo-icon">
          <img src="{% static 'image/loxa.png' %}" alt="LUXA Logo" />
        </div>

        <div class="logo-text">
          <h2>LUXA</h2>
          <span>COLLECTION</span>
          <p class="admin-text">ADMIN - {{ user.name }}</p>
        </div>
      </div>

      <ul class="nav-links">
        <li>
          <a href="{% url 'home' %}">Home</a>
        </li>
        <li>
          <a href="{% url 'dashboard' %}">Dashboard</a>
        </li>
        <li class="dropdown">
          <a href="#">Manage ▾</a>

          <ul class="dropdown-menu">
            <li>
              <a href="{% url 'add_product' %}">Add Product</a>
            </li>

            <li>
              <a href="{% url 'order' %}">Orders</a>
            </li>

            <li>
              <a href="{% url 'home' %}">Customers</a>
            </li>
          </ul>
        </li>

        <li>
          <a href="{% url 'logout' %}">Logout</a>
        </li>
      </ul>
    </nav>
    {% block content %}

    {% endblock %}
  </body>
</html>
