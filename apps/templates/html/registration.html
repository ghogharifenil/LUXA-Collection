{% extends 'base/base2.html' %}
{% load static %}

{% block head %}
<title>LUXA Collection | Register</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/registration.css' %}">

<style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
}

/* ================= MAIN ================= */

.login-container{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:
    linear-gradient(
        rgba(0,0,0,.55),
        rgba(0,0,0,.55)
    ),
   url("{% static 'image/rgister.jpg' %}");

    background-size:contain;
    background-position:center;
    background-repeat:repeat;
}

/* ================= CARD ================= */

.login-card{
    width:100%;
    max-width:430px;

    padding:40px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:20px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.4);
}

/* ================= LOGO ================= */

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo i{
    font-size:40px;
    color:#fff;
}

/* ================= TITLE ================= */

.login-card h2{
    text-align:center;
    color:#fff;
    font-size:28px;
    margin-bottom:5px;
    letter-spacing:2px;
}

.login-card h3{
    text-align:center;
    color:#d1d1d1;
    font-size:13px;
    font-weight:400;
    margin-bottom:25px;
    letter-spacing:3px;
}

/* ================= INPUT ================= */

.input-group{
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    padding:14px 18px;

    border-radius:12px;
    border:1px solid rgba(255,255,255,.15);

    background:rgba(255,255,255,.08);

    color:#fff;
    font-size:14px;

    outline:none;
    transition:.3s;
}

.input-group input::placeholder{
    color:#d1d1d1;
}

.input-group input:focus{
    border-color:#fff;

    box-shadow:
    0 0 15px rgba(255,255,255,.15);
}

/* ================= BUTTON ================= */

.login-btn{
    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    cursor:pointer;

    background:#fff;
    color:#111;

    font-size:15px;
    font-weight:600;

    transition:.3s;
}

.login-btn:hover{
    background:#111;
    color:#fff;

    border:1px solid #fff;

    transform:translateY(-3px);
}

/* ================= LINK ================= */

.forgot-pass{
    display:block;
    text-align:center;

    margin-top:18px;

    color:#fff;
    text-decoration:none;

    font-size:14px;

    transition:.3s;
}

.forgot-pass:hover{
    color:#d1d1d1;
}

/* ================= ERRORS ================= */

.errorlist{
    list-style:none;
    color:#ff6b6b;
    font-size:13px;
    margin-top:5px;
}

/* ================= MOBILE ================= */

@media(max-width:500px){

    html,
    body{
        overflow:auto;
    }

    .login-container{
        padding:15px;
    }

    .login-card{
        padding:25px 20px;
    }

    .login-card h2{
        font-size:24px;
    }
}</style>

{% endblock %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <div class="logo">
            <i class="fa-solid fa-crown"></i>
        </div>

        <h2>LUXA COLLECTION</h2>

        <h3>CREATE ACCOUNT</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                {{ form.name }}
            </div>

            <div class="input-group">
                {{ form.email }}
            </div>

            <div class="input-group">
                {{ form.city }}
            </div>

            <div class="input-group">
                {{ form.password }}
            </div>

            <button type="submit" class="login-btn">
                REGISTER
            </button>

        </form>

        <a href="{% url 'login' %}" class="forgot-pass">
            Already have an account? Login
        </a>

    </div>

</div>

{% endblock %}
