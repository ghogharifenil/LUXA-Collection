<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
        color: #333;
      }
      
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .logo {
        font-size: 24px;
        font-weight: bold;
      }
      
      .title {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin: 30px 0;
      }
      
      .bill-box {
        border-top: 2px solid #000;
        border-bottom: 2px solid #000;
        padding: 20px 0;
      }
      
      .row {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
      }
      
      .total {
        margin-top: 20px;
      }
      
      .total .row {
        font-weight: bold;
      }
      
      .footer {
        text-align: center;
        margin-top: 40px;
        color: #666;
      }
      
      .note {
        margin-top: 20px;
        text-align: center;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="top">
      <div>{{ date }}</div>
      <div class="logo">LUXA COLLECTION</div>
    </div>

    <div class="title">BILL</div>

    <div class="bill-box">
      {% for order in orders %}
        <div class="row">
          <span>{{ order.product.name }}</span>
          <span>₹{{ order.total_price }}</span>
        </div>
      {% endfor %}

      <hr />

      <div class="row">
        <span>Subtotal</span>
        <span>₹{{ total }}</span>
      </div>

      <div class="row">
        <span>Shipping</span>
        <span>₹99</span>
      </div>

      <div class="row">
        <span>Grand Total</span>
        <span>₹{{ total }}</span>
      </div>
    </div>

    <div class="note">Show this bill while receiving your order.</div>

    <div class="footer">Thanks for shopping with LUXA Collection ❤️</div>
  </body>
</html>
